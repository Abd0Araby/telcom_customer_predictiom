<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Customer Churn Prediction</title>

    <style>
        * {
            box-sizing: border-box;
            font-family: "Segoe UI", sans-serif;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: radial-gradient(circle at top left, #2b1055, #0f0f1a 45%, #050507);
            color: #fff;
            padding: 40px 20px;
        }

        .container {
            max-width: 1200px;
            margin: auto;
        }

        .header {
            text-align: center;
            margin-bottom: 35px;
        }

        .header h1 {
            font-size: 42px;
            margin: 0;
            background: linear-gradient(90deg, #f6d365, #fda085);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header p {
            color: #c9c9d6;
            font-size: 17px;
            margin-top: 10px;
        }

        form {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(18px);
            border: 1px solid rgba(255, 255, 255, 0.14);
            border-radius: 28px;
            padding: 35px;
            box-shadow: 0 25px 70px rgba(0, 0, 0, 0.45);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 22px;
        }

        .field {
            display: flex;
            flex-direction: column;
        }

        label {
            margin-bottom: 8px;
            font-size: 14px;
            color: #e8e8ef;
            font-weight: 600;
        }

        input,
        select {
            height: 48px;
            border-radius: 14px;
            border: 1px solid rgba(255, 255, 255, 0.18);
            background: rgba(255, 255, 255, 0.11);
            color: #fff;
            padding: 0 14px;
            font-size: 15px;
            outline: none;
            transition: 0.25s;
        }

        input:focus,
        select:focus {
            border-color: #f6d365;
            box-shadow: 0 0 0 4px rgba(246, 211, 101, 0.15);
        }

        option {
            background: #161622;
            color: #fff;
        }

        input[readonly],
        select:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            background: rgba(255, 255, 255, 0.06);
        }

        .actions {
            margin-top: 35px;
            display: flex;
            justify-content: center;
        }

        button {
            border: none;
            padding: 16px 55px;
            border-radius: 999px;
            background: linear-gradient(90deg, #f6d365, #fda085);
            color: #1b1025;
            font-size: 17px;
            font-weight: 800;
            cursor: pointer;
            box-shadow: 0 15px 35px rgba(253, 160, 133, 0.35);
            transition: 0.25s;
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 20px 45px rgba(253, 160, 133, 0.5);
        }

        #result {
            margin: 30px auto 0;
            max-width: 700px;
            text-align: center;
            padding: 20px;
            border-radius: 18px;
            background: rgba(255, 255, 255, 0.09);
            border: 1px solid rgba(255, 255, 255, 0.14);
            font-size: 22px;
            color: #f6d365;
            display: none;
        }

        .section-title {
            grid-column: 1 / -1;
            margin-top: 10px;
            padding-top: 18px;
            border-top: 1px solid rgba(255, 255, 255, 0.12);
            color: #f6d365;
            font-size: 18px;
            font-weight: 800;
        }

        @media (max-width: 900px) {
            .grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 600px) {
            body {
                padding: 25px 12px;
            }

            .grid {
                grid-template-columns: 1fr;
            }

            form {
                padding: 24px;
            }

            .header h1 {
                font-size: 32px;
            }
        }
    </style>
</head>

<body>

<div class="container">

    <div class="header">
        <h1>Customer Churn Prediction</h1>
        <p>Premium AI-powered customer retention intelligence dashboard</p>
    </div>

    <form id="churnForm">

        <div class="grid">

            <div class="section-title">Customer Profile</div>

            <div class="field">
                <label>Gender</label>
                <select name="gender">
                    <option>Male</option>
                    <option>Female</option>
                </select>
            </div>

            <div class="field">
                <label>Senior Citizen</label>
                <select name="SeniorCitizen">
                    <option>Yes</option>
                    <option>No</option>
                </select>
            </div>

            <div class="field">
                <label>Partner</label>
                <select name="Partner">
                    <option>Yes</option>
                    <option>No</option>
                </select>
            </div>

            <div class="field">
                <label>Dependents</label>
                <select name="Dependents">
                    <option>No</option>
                    <option>Yes</option>
                </select>
            </div>

            <div class="field">
                <label>Tenure</label>
                <input type="number" name="tenure" min="0" value="1" required>
            </div>

            <div class="section-title">Phone Services</div>

            <div class="field">
                <label>Phone Service</label>
                <select name="PhoneService">
                    <option>Yes</option>
                    <option>No</option>
                </select>
            </div>

            <div class="field">
                <label>Multiple Lines</label>
                <select name="MultipleLines">
                    <option>No</option>
                    <option>Yes</option>
                    <option>No phone service</option>
                </select>
            </div>

            <div class="section-title">Internet Services</div>

            <div class="field">
                <label>Internet Service</label>
                <select name="InternetService">
                    <option>Fiber optic</option>
                    <option>DSL</option>
                    <option>No</option>
                </select>
            </div>

            <div class="field">
                <label>Online Security</label>
                <select name="OnlineSecurity">
                    <option>Yes</option>
                    <option>No</option>
                    <option>No internet service</option>
                </select>
            </div>

            <div class="field">
                <label>Online Backup</label>
                <select name="OnlineBackup">
                    <option>No</option>
                    <option>Yes</option>
                    <option>No internet service</option>
                </select>
            </div>

            <div class="field">
                <label>Device Protection</label>
                <select name="DeviceProtection">
                    <option>Yes</option>
                    <option>No</option>
                    <option>No internet service</option>
                </select>
            </div>

            <div class="field">
                <label>Tech Support</label>
                <select name="TechSupport">
                    <option>No</option>
                    <option>Yes</option>
                    <option>No internet service</option>
                </select>
            </div>

            <div class="field">
                <label>Streaming TV</label>
                <select name="StreamingTV">
                    <option>Yes</option>
                    <option>No</option>
                    <option>No internet service</option>
                </select>
            </div>

            <div class="field">
                <label>Streaming Movies</label>
                <select name="StreamingMovies">
                    <option>Yes</option>
                    <option>No</option>
                    <option>No internet service</option>
                </select>
            </div>

            <div class="section-title">Billing & Contract</div>

            <div class="field">
                <label>Contract</label>
                <select name="Contract">
                    <option>Month-to-month</option>
                    <option>One year</option>
                    <option>Two year</option>
                </select>
            </div>

            <div class="field">
                <label>Paperless Billing</label>
                <select name="PaperlessBilling">
                    <option>Yes</option>
                    <option>No</option>
                </select>
            </div>

            <div class="field">
                <label>Payment Method</label>
                <select name="PaymentMethod">
                    <option>Electronic check</option>
                    <option>Mailed check</option>
                    <option>Bank transfer (automatic)</option>
                    <option>Credit card (automatic)</option>
                </select>
            </div>

            <div class="field">
                <label>Monthly Charges</label>
                <input type="number" step="0.01" name="MonthlyCharges" min="0" value="89.5" required>
            </div>

            <div class="field">
                <label>Total Charges</label>
                <input type="number" step="0.01" name="TotalCharges" readonly>
            </div>

        </div>

        <div class="actions">
            <button type="submit">Predict Churn</button>
        </div>

    </form>

    <h3 id="result"></h3>

</div>

<script>
const form = document.getElementById("churnForm");
const resultBox = document.getElementById("result");

const phoneService = form.elements["PhoneService"];
const multipleLines = form.elements["MultipleLines"];
const internetService = form.elements["InternetService"];

const internetDependentFields = [
    form.elements["OnlineSecurity"],
    form.elements["OnlineBackup"],
    form.elements["DeviceProtection"],
    form.elements["TechSupport"],
    form.elements["StreamingTV"],
    form.elements["StreamingMovies"]
];

const tenure = form.elements["tenure"];
const monthlyCharges = form.elements["MonthlyCharges"];
const totalCharges = form.elements["TotalCharges"];

function calculateTotalCharges() {
    totalCharges.value = (Number(tenure.value) * Number(monthlyCharges.value)).toFixed(2);
}

function applyValidationRules() {
    if (phoneService.value === "No") {
        multipleLines.value = "No phone service";
        multipleLines.disabled = true;
    } else {
        multipleLines.disabled = false;
        if (multipleLines.value === "No phone service") {
            multipleLines.value = "No";
        }
    }

    if (internetService.value === "No") {
        internetDependentFields.forEach(field => {
            field.value = "No internet service";
            field.disabled = true;
        });
    } else {
        internetDependentFields.forEach(field => {
            field.disabled = false;
            if (field.value === "No internet service") {
                field.value = "No";
            }
        });
    }

    calculateTotalCharges();
}

function collectData() {
    return {
        gender: form.elements["gender"].value,
        SeniorCitizen: form.elements["SeniorCitizen"].value,
        Partner: form.elements["Partner"].value,
        Dependents: form.elements["Dependents"].value,
        tenure: Number(form.elements["tenure"].value),
        PhoneService: form.elements["PhoneService"].value,
        MultipleLines: form.elements["MultipleLines"].value,
        InternetService: form.elements["InternetService"].value,
        OnlineSecurity: form.elements["OnlineSecurity"].value,
        OnlineBackup: form.elements["OnlineBackup"].value,
        DeviceProtection: form.elements["DeviceProtection"].value,
        TechSupport: form.elements["TechSupport"].value,
        StreamingTV: form.elements["StreamingTV"].value,
        StreamingMovies: form.elements["StreamingMovies"].value,
        Contract: form.elements["Contract"].value,
        PaperlessBilling: form.elements["PaperlessBilling"].value,
        PaymentMethod: form.elements["PaymentMethod"].value,
        MonthlyCharges: Number(form.elements["MonthlyCharges"].value),
        TotalCharges: Number(form.elements["TotalCharges"].value)
    };
}

phoneService.addEventListener("change", applyValidationRules);
internetService.addEventListener("change", applyValidationRules);
tenure.addEventListener("input", calculateTotalCharges);
monthlyCharges.addEventListener("input", calculateTotalCharges);

form.addEventListener("submit", async function(event) {
    event.preventDefault();

    applyValidationRules();

    const data = collectData();

    try {
        const response = await fetch("/predict", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(data)
        });

        const result = await response.json();

        resultBox.style.display = "block";
        resultBox.innerText = result.Result;

    } catch (error) {
        resultBox.style.display = "block";
        resultBox.innerText = "Error while sending data to the server";
        console.error(error);
    }
});

applyValidationRules();
</script>

</body>
</html>
